<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Capability Assessment</title>
    <meta name="description" content="Assess your AI capabilities and get a tailored AI development roadmap.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- AI Tech Background Video (YouTube) -->
    <iframe id="bg-video" 
            src="https://www.youtube.com/embed/s9xk77X4m5c?autoplay=1&mute=1&controls=0&disablekb=1&fs=0&loop=1&playlist=s9xk77X4m5c&playsinline=1" 
            frameborder="0" 
            allow="autoplay; encrypted-media">
    </iframe>
    <div id="bg-overlay"></div>
    
    <div id="app" class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <img src="logo.png" alt="Logo" id="brand-logo">
            </div>
            <div class="progress-container" id="progress-bar-wrapper" style="display: none;">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Content will be injected by app.js -->
            <div id="loading" class="screen">
                <div class="spinner"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2025 Universitatea „Alexandru Ioan Cuza” din Iași. All rights reserved.</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
